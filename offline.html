<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b0a0d">
<title>Ant Scout — Offline</title>
<style>
  html, body { margin: 0; height: 100%; background: #0b0a0d; color: #f3e8d8;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  .wrap { min-height: 100%; display: flex; flex-direction: column; align-items: center;
    justify-content: center; text-align: center; padding: 24px; box-sizing: border-box; }
  img { width: 108px; height: 108px; border-radius: 24px; margin-bottom: 20px; }
  h1 { font-size: 1.4rem; margin: 0 0 8px; }
  p { opacity: 0.7; max-width: 22rem; line-height: 1.5; margin: 0 0 22px; }
  button { background: #f3e8d8; color: #0b0a0d; border: 0; border-radius: 999px;
    padding: 12px 24px; font-size: 1rem; font-weight: 600; cursor: pointer; }
</style>
</head>
<body>
<div class="wrap">
  <img src="icons/icon-192x192.png" alt="Ant Scout">
  <h1>You're offline</h1>
  <p>Ant Scout couldn't reach the network. Once the game has loaded at least once, it plays fully offline — live weather just won't update.</p>
  <button onclick="location.href='./'">Try again</button>
</div>
</body>
</html>
