<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Ant Scout — The Buried Cavern</title>
<meta name="description" content="Guide a tiny ant scout digging through a buried cavern. Live local weather changes the sky, wind, and storms above.">

<!-- PWA -->
<meta name="theme-color" content="#0b0a0d">
<link rel="manifest" href="manifest.json">

<!-- iOS home-screen app -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ant Scout">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

<!-- favicons -->
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png">

<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>

<!-- load order matters: constants -> state -> core -> systems -> loop -->
<script src="js/config.js"></script>
<script src="js/state.js"></script>
<script src="js/core.js"></script>
<script src="js/world.js"></script>
<script src="js/weather.js"></script>
<script src="js/input.js"></script>
<script src="js/update.js"></script>
<script src="js/render.js"></script>
<script src="js/main.js"></script>

<!-- register the service worker so the game installs & plays offline -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('sw.js').catch(function () {});
  });
}
</script>
</body>
</html>
