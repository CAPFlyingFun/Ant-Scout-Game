<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Ant Scout — The Buried Cavern</title>
<meta name="description" content="Guide a tiny ant scout digging through a buried cavern. Live local weather changes the sky, wind, and storms above.">

<!-- PWA -->
<meta name="theme-color" content="#0b0a0d">
<link rel="manifest" href="manifest.json">

<!-- iOS home-screen app -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ant Scout">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

<!-- favicons -->
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png">

<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>

<!-- probe: its height resolves to the top safe-area inset so the canvas HUD can dodge the notch -->
<div id="safeprobe"></div>

<!-- main menu -->
<div id="menu" class="overlay">
  <div class="card">
    <div class="title">🐜 Ant Scout <span id="ver" class="ver"></span></div>
    <div class="subtitle">The Buried Cavern</div>
    <button id="btnPlay" class="btn primary">▶ Play</button>
    <button id="btnSettings" class="btn">⚙ Settings</button>
    <div id="menuWx" class="wxline">—</div>
  </div>
</div>

<!-- settings -->
<div id="settings" class="overlay hidden">
  <div class="card">
    <div class="title small">⚙ Settings</div>
    <div class="label">Environment</div>
    <div class="seg" id="segMode">
      <button data-mode="live" class="seg-btn">📍 Live weather</button>
      <button data-mode="manual" class="seg-btn">🎨 Manual</button>
    </div>
    <div id="livePanel">
      <button id="btnGPS" class="btn">📍 Use my location</button>
      <button id="btnZip" class="btn">🔢 Enter ZIP code</button>
      <div id="locLine" class="wxline">No saved location</div>
    </div>
    <div id="manualPanel" class="hidden">
      <div class="label">Time of day</div>
      <div class="seg" id="segTime">
        <button data-day="1" class="seg-btn">☀ Day</button>
        <button data-day="0" class="seg-btn">🌙 Night</button>
      </div>
      <div class="label">Weather</div>
      <div class="seg wrap" id="segKind">
        <button data-kind="clear" class="seg-btn">Clear</button>
        <button data-kind="cloudy" class="seg-btn">Cloudy</button>
        <button data-kind="rain" class="seg-btn">Rain</button>
        <button data-kind="snow" class="seg-btn">Snow</button>
        <button data-kind="storm" class="seg-btn">Storm</button>
        <button data-kind="fog" class="seg-btn">Fog</button>
      </div>
      <button id="btnRandom" class="btn">🎲 Randomize</button>
    </div>
    <button id="btnCustomize" class="btn">🎮 Customize controls</button>
    <button id="btnBack" class="btn primary">✓ Done</button>
  </div>
</div>

<!-- control-customization toolbar (shown in edit mode) -->
<div id="editctrl" class="edit-bar hidden">
  <div class="edit-line"><b>🎮 Customize controls</b> · <span id="editOrient">Portrait</span></div>
  <div class="edit-line">Drag any control. Selected: <b id="editSel">Move</b></div>
  <div class="edit-line"><span>Size</span><input id="editSize" type="range" min="0.6" max="1.6" step="0.05" value="1"></div>
  <div class="edit-line">
    <button id="btnEditReset" class="edit-btn">↺ Reset</button>
    <button id="btnEditDone" class="edit-btn primary">✓ Done</button>
  </div>
</div>

<!-- death -->
<div id="death" class="overlay hidden">
  <div class="card">
    <div class="title small">💀 Your ant perished</div>
    <div id="deathMsg" class="subtitle">—</div>
    <button id="btnRespawn" class="btn primary">↻ Try again</button>
    <button id="btnDeathMenu" class="btn">☰ Main menu</button>
  </div>
</div>

<button id="btnPause" class="corner-btn hidden">☰</button>
<button id="btnAction" class="action-btn hidden"></button>

<!-- load order matters: constants -> state -> core -> shared systems -> scenes -> menu -> loop -->
<script src="js/config.js"></script>
<script src="js/state.js"></script>
<script src="js/core.js"></script>
<script src="js/world.js"></script>
<script src="js/weather.js"></script>
<script src="js/input.js"></script>
<script src="js/controls.js"></script>
<script src="js/update.js"></script>
<script src="js/render.js"></script>
<script src="js/scenes.js"></script>
<script src="js/combat.js"></script>
<script src="js/scene_underground.js"></script>
<script src="js/props.js"></script>
<script src="js/scene_surface.js"></script>
<script src="js/survival.js"></script>
<script src="js/menu.js"></script>
<script src="js/main.js"></script>

<!-- register the service worker so the game installs & plays offline,
     and auto-apply new versions right away on the next push -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('sw.js').then(function (reg) {
      // A genuinely new version has finished installing (there was already a
      // controller, so this is an UPDATE, not the first install).
      var updateReady = false;
      reg.addEventListener('updatefound', function () {
        var nw = reg.installing;
        if (!nw) return;
        nw.addEventListener('statechange', function () {
          if (nw.state === 'installed' && navigator.serviceWorker.controller) {
            updateReady = true;
            nw.postMessage({ type: 'SKIP_WAITING' }); // belt & suspenders; sw also skipWaits on install
          }
        });
      });

      // The new worker took control -> swap to it immediately (once).
      var reloading = false;
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        if (!updateReady || reloading) return;   // ignore the first-install claim
        reloading = true;
        window.location.reload();
      });

      // Look for a new version on launch and whenever the app is refocused,
      // so an app left open still picks up a fresh push.
      var check = function () { reg.update().catch(function () {}); };
      check();
      document.addEventListener('visibilitychange', function () {
        if (document.visibilityState === 'visible') check();
      });
    }).catch(function () {});
  });
}
</script>
</body>
</html>
